<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULZER - Equipment Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border: 1px solid #333;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #003d99;
            letter-spacing: 2px;
        }

        .report-number {
            border: 2px solid #333;
            padding: 8px 15px;
            font-weight: bold;
            text-align: center;
        }

        .report-number label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .report-number input {
            border: none;
            text-align: center;
            font-size: 14px;
            width: 100px;
        }

        .title-section {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .badge {
            background-color: #003d99;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-right: 20px;
            white-space: nowrap;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #003d99;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            border: 1px solid #333;
        }

        .form-group label {
            display: block;
            background-color: #f9f9f9;
            padding: 10px;
            border-bottom: 1px solid #333;
            font-weight: bold;
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            font-size: 13px;
        }

        .camera-label {
            text-align: right;
            padding: 10px;
            font-size: 13px;
            color: #333;
        }

        .photo-box {
            border: 1px solid #333;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            margin-bottom: 20px;
        }

        .photo-box.camera {
            padding-right: 10px;
        }

        .large-box {
            border: 1px solid #333;
            height: 150px;
            margin-bottom: 20px;
            background-color: #fafafa;
        }

        .comments-section {
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .comments-label {
            background-color: #f9f9f9;
            padding: 10px;
            border-bottom: 1px solid #333;
            font-weight: bold;
            font-size: 13px;
            color: #003d99;
        }

        .comments-box {
            min-height: 80px;
            padding: 10px;
            background-color: #fafafa;
        }

        .footer-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border: 1px solid #333;
        }

        .footer-box {
            padding: 15px;
            border-right: 1px solid #333;
        }

        .footer-box:last-child {
            border-right: none;
        }

        .footer-box label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .footer-input {
            width: 100%;
            padding: 15px;
            border: none;
            background-color: #fafafa;
            min-height: 60px;
        }

        .company-name {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #666;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">SULZER</div>
            <div class="report-number">
                <label>Report Number / [Text?]</label>
                <input type="text" placeholder="">
            </div>
        </div>

        <!-- Title Section -->
        <div class="title-section">
            <div class="badge">R1.09</div>
            <div class="title">As received condition of Equipment Report</div>
        </div>

        <!-- Form Fields Section -->
        <div class="form-row">
            <div>
                <div class="form-group">
                    <label>Customer</label>
                    <input type="text">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Project</label>
                    <input type="text">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Date received</label>
                    <input type="text">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Equipment</label>
                    <input type="text">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Inspected By</label>
                    <input type="text">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Sulzer SO Number</label>
                    <input type="text">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Scope of work</label>
                    <input type="text">
                </div>
            </div>

            <div>
                <div style="border: 1px solid #333; height: 290px; background-color: #fafafa; display: flex; align-items: center; justify-content: center;">
                    <div style="text-align: right; width: 100%; padding: 10px;">
                        <div style="font-size: 13px; color: #333;">Camera / upload</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Large Photo Boxes -->
        <div class="form-row">
            <div class="large-box"></div>
            <div class="large-box"></div>
        </div>

        <div class="form-row">
            <div class="large-box"></div>
            <div class="large-box"></div>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
            <div class="comments-label">Comments / Remarks:</div>
            <div class="comments-box"></div>
        </div>

        <!-- Footer Section -->
        <div class="footer-section">
            <div class="footer-box">
                <label></label>
                <div class="footer-input"></div>
            </div>
            <div class="footer-box">
                <label>Received By:</label>
                <div class="footer-input"></div>
            </div>
        </div>

        <!-- Company Footer -->
        <div class="company-name">SULZER CO. CONTACTS</div>
    </div>
</body>
</html>
